<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>内容中心 - 后台管理</title>
    <link rel="stylesheet" th:href="@{/admin/css/turquoise-admin.css}">
</head>
<body>
    <div th:replace="admin/turquoise-admin-layout :: header"></div>
    <div th:replace="admin/turquoise-admin-layout :: sidebar"></div>
    <main class="turquoise-content">
        <!-- 内容列表 -->
        <div class="turquoise-page">
            <div class="turquoise-page-header">
                <h2 class="turquoise-page-title">内容管理</h2>
                <a href="@{/admin/content/add}" class="turquoise-btn turquoise-btn-primary">添加内容</a>
            </div>
            
            <!-- 搜索和筛选 -->
            <div class="turquoise-search-filter">
                <form th:action="@{/admin/content}" method="get">
                    <div class="turquoise-search-row">
                        <div class="turquoise-search-item">
                            <input type="text" name="keyword" placeholder="内容标题" class="turquoise-input">
                        </div>
                        <div class="turquoise-search-item">
                            <select name="category" class="turquoise-select">
                                <option value="">全部分类</option>
                                <option value="1">新闻资讯</option>
                                <option value="2">行业动态</option>
                                <option value="3">品牌故事</option>
                            </select>
                        </div>
                        <div class="turquoise-search-item">
                            <button type="submit" class="turquoise-btn turquoise-btn-primary">搜索</button>
                        </div>
                    </div>
                </form>
            </div>
            
            <!-- 内容表格 -->
            <div class="turquoise-table-container">
                <table class="turquoise-table">
                    <thead>
                        <tr>
                            <th>内容ID</th>
                            <th>标题</th>
                            <th>分类</th>
                            <th>发布时间</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="content : ${contentList}">
                            <td th:text="${content.contentId}"></td>
                            <td th:text="${content.title}"></td>
                            <td th:text="${content.categoryName}"></td>
                            <td th:text="${content.createTime}"></td>
                            <td>
                                <span th:if="${content.status == 1}" class="turquoise-status turquoise-status-up">发布</span>
                                <span th:else class="turquoise-status turquoise-status-down">草稿</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/content/edit/{id}(id=${content.contentId})}" class="turquoise-btn turquoise-btn-blue">编辑</a>
                                <button th:if="${content.status == 1}" class="turquoise-btn turquoise-btn-gray" th:onclick="|offlineContent(${content.contentId})|">下线</button>
                                <button th:else class="turquoise-btn turquoise-btn-green" th:onclick="|publishContent(${content.contentId})|">发布</button>
                            </td>
                        </tr>
                        <!-- 无数据时显示 -->
                        <tr th:if="${contentList == null or contentList.size() == 0}">
                            <td colspan="6" class="turquoise-table-empty">暂无内容数据</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- 分页 -->
            <div class="turquoise-pagination">
                <ul class="turquoise-pagination-list">
                    <li>
                        <a th:href="@{/admin/content(page=${page-1}, limit=${limit}, keyword=${keyword}, category=${category})}" th:if="${page > 1}">上一页</a>
                        <span th:else class="turquoise-pagination-disabled">上一页</span>
                    </li>
                    <li class="turquoise-pagination-item active">
                        <span th:text="${page}"></span>
                    </li>
                    <li>
                        <a th:href="@{/admin/content(page=${page+1}, limit=${limit}, keyword=${keyword}, category=${category})}" th:if="${(page * limit) < total}">下一页</a>
                        <span th:else class="turquoise-pagination-disabled">下一页</span>
                    </li>
                </ul>
                <div class="turquoise-pagination-info">
                    共 <span th:text="${total}"></span> 条记录
                </div>
            </div>
        </div>
    </main>
    <script>
        // 发布内容
        function publishContent(contentId) {
            if (confirm('确认发布该内容？')) {
                fetch('/admin/content/publish/' + contentId, {
                    method: 'POST'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.resultCode === 200) {
                        alert(data.message || '发布成功');
                        location.reload();
                    } else {
                        alert(data.message || '发布失败');
                    }
                })
                .catch(error => {
                    console.error('发布失败：', error);
                    alert('发布失败，请重试');
                });
            }
        }
        
        // 下线内容
        function offlineContent(contentId) {
            if (confirm('确认下线该内容？')) {
                fetch('/admin/content/offline/' + contentId, {
                    method: 'POST'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.resultCode === 200) {
                        alert(data.message || '下线成功');
                        location.reload();
                    } else {
                        alert(data.message || '下线失败');
                    }
                })
                .catch(error => {
                    console.error('下线失败：', error);
                    alert('下线失败，请重试');
                });
            }
        }
    </script>
</body>
</html>
