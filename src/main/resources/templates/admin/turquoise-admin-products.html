<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="admin/turquoise-admin-layout :: admin-head"></th:block>
    <style>
        /* 商品图片样式 */
        .turquoise-goods-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
        }
        
        /* 商品名称样式 */
        .product-name-cell {
            max-width: 350px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* 表格列宽优化 */
        .turquoise-table th:nth-child(1) {
            width: 80px;
        }
        
        .turquoise-table th:nth-child(2) {
            width: 80px;
        }
        
        .turquoise-table th:nth-child(3) {
            width: 30%;
        }
        
        .turquoise-table th:nth-child(4) {
            width: 150px;
        }
        
        .turquoise-table th:nth-child(5),
        .turquoise-table th:nth-child(6),
        .turquoise-table th:nth-child(7) {
            width: 80px;
            text-align: center;
        }
        
        .turquoise-table th:nth-child(8) {
            width: 80px;
        }
        
        .turquoise-table th:nth-child(9) {
            width: 15%;
        }
        
        /* 表格单元格居中 */
        .turquoise-table td:nth-child(5),
        .turquoise-table td:nth-child(6),
        .turquoise-table td:nth-child(7),
        .turquoise-table td:nth-child(8) {
            text-align: center;
        }
        
        /* 操作按钮样式 */
        .turquoise-btn {
            margin-left: 4px;
            padding: 3px 8px;
            font-size: 12px;
            border-radius: 3px;
        }
        
        .turquoise-btn:first-child {
            margin-left: 0;
        }
        
        .turquoise-btn-blue {
            background-color: #4A90E2;
            color: white;
            border: none;
            padding: 3px 8px;
            font-size: 12px;
            border-radius: 3px;
            cursor: pointer;
            margin-left: 4px;
        }
        
        .turquoise-btn-blue:first-child {
            margin-left: 0;
        }
        
        .turquoise-btn-blue:hover {
            background-color: #357ABD;
        }
        
        .turquoise-btn-gray {
            background-color: #95A5A6;
            color: white;
            border: none;
            padding: 3px 8px;
            font-size: 12px;
            border-radius: 3px;
            cursor: pointer;
            margin-left: 4px;
        }
        
        .turquoise-btn-gray:hover {
            background-color: #7F8C8D;
        }
        
        .turquoise-btn-green {
            background-color: #5CB85C;
            color: white;
            border: none;
            padding: 3px 8px;
            font-size: 12px;
            border-radius: 3px;
            cursor: pointer;
            margin-left: 4px;
        }
        
        .turquoise-btn-green:hover {
            background-color: #4CAE4C;
        }
        
        .turquoise-btn-red {
            background-color: #D9534F;
            color: white;
            border: none;
            padding: 3px 8px;
            font-size: 12px;
            border-radius: 3px;
            cursor: pointer;
            margin-left: 4px;
        }
        
        .turquoise-btn-red:hover {
            background-color: #C9302C;
        }
        
        /* 上架状态样式 */
        .turquoise-status {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 12px;
            vertical-align: middle;
        }
        
        .turquoise-status-up {
            background-color: #e6f7f0;
            color: #52c41a;
        }
        
        .turquoise-status-down {
            background-color: #f5f5f5;
            color: #999;
        }
        
        /* 搜索筛选栏样式 */
        .turquoise-search-filter {
            margin-bottom: 20px;
        }
        
        .turquoise-search-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .turquoise-search-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .turquoise-input,
        .turquoise-select {
            padding: 6px 12px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            min-width: 150px;
        }
        
        .turquoise-btn-primary {
            padding: 6px 16px;
            background-color: #4A90E2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .turquoise-btn-primary:hover {
            background-color: #357ABD;
        }
        
        .turquoise-btn-reset {
            padding: 6px 16px;
            background-color: #f3f4f6;
            color: #374151;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .turquoise-btn-reset:hover {
            background-color: #e5e7eb;
        }
        
        /* 分页器样式 */
        .turquoise-pagination {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .turquoise-pagination-list {
            display: flex;
            list-style: none;
            gap: 5px;
        }
        
        .turquoise-pagination-item {
            margin: 0 5px;
        }
        
        .turquoise-pagination-item.active {
            font-weight: bold;
        }
        
        .turquoise-pagination-disabled {
            color: #9ca3af;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <th:block th:replace="admin/turquoise-admin-layout :: header"></th:block>
    <th:block th:replace="admin/turquoise-admin-layout :: sidebar"></th:block>
    
    <main class="turquoise-content">
        <!-- 商品列表 -->
        <div class="turquoise-page">
            <div class="turquoise-page-header">
                <h2 class="turquoise-page-title">商品列表</h2>
            </div>
            
            <!-- 搜索和筛选 -->
            <div class="turquoise-search-filter">
                <form th:action="@{/admin/products}" method="get">
                    <div class="turquoise-search-row">
                        <div class="turquoise-search-item">
                            <input type="text" name="keyword" th:value="${keyword}" placeholder="商品名称" class="turquoise-input">
                        </div>
                        <div class="turquoise-search-item">
                            <select name="categoryId" class="turquoise-select">
                                <option value="">全部分类</option>
                                <option th:each="category : ${categoryList}" th:value="${category.categoryId}" th:text="${category.categoryName}" th:selected="${categoryId == category.categoryId}"></option>
                            </select>
                        </div>
                        <div class="turquoise-search-item">
                            <select name="status" class="turquoise-select">
                                <option value="">全部状态</option>
                                <option value="1" th:selected="${status == 1}">上架</option>
                                <option value="0" th:selected="${status == 0}">下架</option>
                            </select>
                        </div>
                        <div class="turquoise-search-item">
                            <button type="submit" class="turquoise-btn turquoise-btn-primary">查询</button>
                        </div>
                        <div class="turquoise-search-item">
                            <button type="button" class="turquoise-btn-reset" onclick="resetSearchForm()">重置</button>
                        </div>
                    </div>
                </form>
            </div>
            
            <!-- 商品表格 -->
            <div class="turquoise-table-container">
                <table class="turquoise-table">
                    <thead>
                        <tr>
                            <th>商品ID</th>
                            <th>商品图片</th>
                            <th>商品名称</th>
                            <th>属性</th>
                            <th>售价</th>
                            <th>库存</th>
                            <th>限购数量</th>
                            <th>上架状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="goods : ${goodsList}">
                            <td th:text="${goods.goodsId}"></td>
                            <td>
                                <img th:src="${goods.goodsCoverImg != null and goods.goodsCoverImg != '' ? goods.goodsCoverImg : '/images/placeholder/placeholder.jpg'}" alt="商品图片" class="turquoise-goods-img">
                            </td>
                            <td class="product-name-cell" th:title="${goods.goodsName}" th:text="${goods.goodsName}"></td>
                            <td>
                                <span th:if="${goods.turquoiseOrigin != null}" th:text="${goods.turquoiseOrigin}" class="tag tag-origin"></span>
                                <span th:if="${goods.turquoiseType != null}" th:text="${goods.turquoiseType}" class="tag tag-type"></span>
                                <span th:if="${goods.turquoiseColor != null}" th:text="${goods.turquoiseColor}" class="tag tag-color"></span>
                                <span th:if="${goods.turquoiseDensity != null}" th:text="${goods.turquoiseDensity}" class="tag tag-density"></span>
                                <span th:if="${goods.turquoiseOrigin == null and goods.turquoiseType == null and goods.turquoiseColor == null and goods.turquoiseDensity == null}">-</span>
                            </td>
                            <td th:text="${goods.sellingPrice}"></td>
                            <td th:text="${goods.stockNum}"></td>
                            <td th:text="${goods.maxBuyNum != null ? goods.maxBuyNum : 5}"></td>
                            <td>
                                <span th:if="${goods.goodsSellStatus == 1}" class="turquoise-status turquoise-status-up">上架</span>
                                <span th:else class="turquoise-status turquoise-status-down">下架</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/products/edit/{id}(id=${goods.goodsId})}" class="turquoise-btn turquoise-btn-blue">编辑</a>
                                <button th:if="${goods.goodsSellStatus == 1}" class="turquoise-btn turquoise-btn-gray">下架</button>
                                <button th:else class="turquoise-btn turquoise-btn-green">上架</button>
                                <button class="turquoise-btn turquoise-btn-red">删除</button>
                            </td>
                        </tr>
                        <!-- 无数据时显示 -->
                        <tr th:if="${goodsList == null or goodsList.size() == 0}">
                            <td colspan="9" class="turquoise-table-empty">暂无商品数据</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- 分页 -->
            <div class="turquoise-pagination">
                <ul class="turquoise-pagination-list">
                    <!-- 上一页 -->
                    <li>
                        <a th:href="@{/admin/products(page=${page-1}, limit=${limit}, keyword=${keyword}, status=${status})}" th:if="${page > 1}">上一页</a>
                        <span th:else class="turquoise-pagination-disabled">上一页</span>
                    </li>
                    
                    <!-- 首页 -->
                    <li th:class="'turquoise-pagination-item ' + (1 == page ? 'active' : '')">
                        <a th:href="@{/admin/products(page=1, limit=${limit}, keyword=${keyword}, status=${status})}" th:text="1" th:if="${1 != page}"></a>
                        <span th:text="1" th:if="${1 == page}"></span>
                    </li>
                    
                    <!-- 前省略号 -->
                    <li th:if="${page > 4}" class="turquoise-pagination-item">
                        <span>...</span>
                    </li>
                    
                    <!-- 当前页前后2页 -->
                    <li th:each="i : ${#numbers.sequence(page-2, page+2)}" th:class="'turquoise-pagination-item ' + (i == page ? 'active' : '')" th:if="${i > 1 and i < totalPages}">
                        <a th:href="@{/admin/products(page=${i}, limit=${limit}, keyword=${keyword}, status=${status})}" th:text="${i}" th:if="${i != page}"></a>
                        <span th:text="${i}" th:if="${i == page}"></span>
                    </li>
                    
                    <!-- 后省略号 -->
                    <li th:if="${page < totalPages - 3}" class="turquoise-pagination-item">
                        <span>...</span>
                    </li>
                    
                    <!-- 尾页 -->
                    <li th:class="'turquoise-pagination-item ' + (totalPages == page ? 'active' : '')" th:if="${totalPages > 1}">
                        <a th:href="@{/admin/products(page=${totalPages}, limit=${limit}, keyword=${keyword}, status=${status})}" th:text="${totalPages}" th:if="${totalPages != page}"></a>
                        <span th:text="${totalPages}" th:if="${totalPages == page}"></span>
                    </li>
                    
                    <!-- 下一页 -->
                    <li>
                        <a th:href="@{/admin/products(page=${page+1}, limit=${limit}, keyword=${keyword}, status=${status})}" th:if="${(page * limit) < total}">下一页</a>
                        <span th:else class="turquoise-pagination-disabled">下一页</span>
                    </li>
                </ul>
                <div class="turquoise-pagination-info">
                    共 <span th:text="${total}"></span> 条 / 第 <span th:text="${page}"></span> 页 / 共 <span th:text="${(total + limit - 1) / limit}"></span> 页
                </div>
            </div>
        </div>
    </main>
    
    <th:block th:replace="admin/turquoise-admin-layout :: admin-script"></th:block>
    
    <!-- 添加商品弹窗 -->
    <div class="turquoise-modal-overlay" id="addModal">
        <div class="turquoise-modal">
            <div class="turquoise-modal-header">
                <h3 class="turquoise-modal-title">添加商品</h3>
            </div>
            <div class="turquoise-modal-body">
                <form id="addProductForm" th:action="@{/admin/products/save}" method="post">
                    <div class="turquoise-form-group">
                        <label class="turquoise-form-label">商品名称</label>
                        <input type="text" class="turquoise-form-input" name="goodsName" placeholder="如：云盖寺 · 高瓷蓝水滴吊坠" required>
                    </div>
                    <div class="turquoise-form-row">
                        <div class="turquoise-form-group">
                            <label class="turquoise-form-label">矿口</label>
                            <select class="turquoise-form-select" name="turquoiseOrigin">
                                <option value="">请选择矿口</option>
                                <option th:each="item : ${originList}" th:value="${item.attrName}" th:text="${item.attrName}"></option>
                            </select>
                        </div>
                        <div class="turquoise-form-group">
                            <label class="turquoise-form-label">品类</label>
                            <select class="turquoise-form-select" name="turquoiseType">
                                <option value="">请选择品类</option>
                                <option th:each="item : ${typeList}" th:value="${item.attrName}" th:text="${item.attrName}"></option>
                            </select>
                        </div>
                        <div class="turquoise-form-group">
                            <label class="turquoise-form-label">颜色</label>
                            <select class="turquoise-form-select" name="turquoiseColor">
                                <option value="">请选择颜色</option>
                                <option th:each="item : ${colorList}" th:value="${item.attrName}" th:text="${item.attrName}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="turquoise-form-row">
                        <div class="turquoise-form-group">
                            <label class="turquoise-form-label">瓷度</label>
                            <select class="turquoise-form-select" name="turquoiseDensity">
                                <option value="">请选择瓷度</option>
                                <option th:each="item : ${densityList}" th:value="${item.attrName}" th:text="${item.attrName}"></option>
                            </select>
                        </div>
                        <div class="turquoise-form-group">
                            <label class="turquoise-form-label">重量</label>
                            <input type="text" class="turquoise-form-input" name="weight" placeholder="如 12.5g">
                        </div>
                        <div class="turquoise-form-group">
                            <label class="turquoise-form-label">尺寸</label>
                            <input type="text" class="turquoise-form-input" name="size" placeholder="如 25×18×10mm">
                        </div>
                    </div>
                    <div class="turquoise-form-row">
                        <div class="turquoise-form-group">
                            <label class="turquoise-form-label">证书编号</label>
                            <input type="text" class="turquoise-form-input" name="certificateNo" placeholder="如 NG20240501XXXX">
                        </div>
                        <div class="turquoise-form-group">
                            <label class="turquoise-form-label">鉴定机构</label>
                            <input type="text" class="turquoise-form-input" name="appraisalOrg" placeholder="鉴定机构名称">
                        </div>
                        <div class="turquoise-form-group">
                            <label class="turquoise-form-label">检测结论</label>
                            <input type="text" class="turquoise-form-input" name="appraisalResult" placeholder="如 天然绿松石 - 高瓷蓝">
                        </div>
                    </div>
                    <div class="turquoise-form-row two-col">
                        <div class="turquoise-form-group">
                            <label class="turquoise-form-label">价格 (¥)</label>
                            <input type="number" class="turquoise-form-input" name="sellingPrice" placeholder="0.00" required>
                        </div>
                        <div class="turquoise-form-group">
                            <label class="turquoise-form-label">库存</label>
                            <input type="number" class="turquoise-form-input" name="stockNum" placeholder="0" required>
                        </div>
                    </div>
                    <div class="turquoise-form-row two-col">
                        <div class="turquoise-form-group">
                            <label class="turquoise-form-label">限购数量</label>
                            <input type="number" class="turquoise-form-input" name="maxBuyNum" placeholder="5" min="1" value="5">
                        </div>
                    </div>
                    <div class="turquoise-form-group">
                        <label class="turquoise-form-label">上传图片</label>
                        <div class="turquoise-upload-area">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p>点击或拖拽文件到此处上传</p>
                            <input type="file" name="goodsImg" class="turquoise-file-input">
                        </div>
                    </div>
                </form>
            </div>
            <div class="turquoise-modal-footer">
                <button id="cancelAddBtn" class="turquoise-btn-cancel">取消</button>
                <button type="submit" form="addProductForm" class="turquoise-btn-submit">保存</button>
            </div>
        </div>
    </div>
    
    <script>
        // 上架/下架功能
        function handleStatusChange(event) {
            const button = event.target;
            const goodsId = button.closest('tr').querySelector('td:first-child').textContent;
            const currentStatus = button.classList.contains('turquoise-btn-gray') ? 1 : 0; // 1=上架，0=下架
            const newStatus = currentStatus === 1 ? 0 : 1;
            const statusText = newStatus === 1 ? '上架' : '下架';
            
            if (confirm(`确认${statusText}该商品？`)) {
                // 发送AJAX请求
                const formData = new FormData();
                formData.append('goodsId', goodsId);
                formData.append('status', newStatus);
                
                fetch('/admin/products/status', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.resultCode === 200) {
                        alert('操作成功');
                        location.reload();
                    } else {
                        alert(data.message || '操作失败');
                    }
                })
                .catch(error => {
                    console.error('操作失败：', error);
                    alert('操作失败，请重试');
                });
            }
        }
        
        // 删除功能
        function handleDelete(event) {
            const button = event.target;
            const goodsId = button.closest('tr').querySelector('td:first-child').textContent;
            
            if (confirm('确认删除该商品？此操作不可恢复')) {
                // 发送AJAX请求
                const formData = new FormData();
                formData.append('goodsId', goodsId);
                
                fetch('/admin/products/delete', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.resultCode === 200) {
                        alert('删除成功');
                        location.reload();
                    } else {
                        alert(data.message || '删除失败');
                    }
                })
                .catch(error => {
                    console.error('删除失败：', error);
                    alert('删除失败，请重试');
                });
            }
        }
        
        // 绑定事件
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM加载完成，开始绑定事件');
            
            // 绑定状态变更按钮事件
            const statusButtons = document.querySelectorAll('button.turquoise-btn-gray, button.turquoise-btn-green');
            statusButtons.forEach(button => {
                button.addEventListener('click', handleStatusChange);
            });
            
            // 绑定删除按钮事件
            const deleteButtons = document.querySelectorAll('button.turquoise-btn-red');
            deleteButtons.forEach(button => {
                button.addEventListener('click', handleDelete);
            });
            
            // 弹窗控制
            const addModal = document.getElementById('addModal');
            const cancelAddBtn = document.getElementById('cancelAddBtn');
            
            console.log('弹窗元素：', { addModal, cancelAddBtn });
            
            // 打开弹窗的函数
            window.openAddProductModal = function() {
                console.log('调用openAddProductModal函数');
                if (addModal) {
                    console.log('添加active类');
                    addModal.classList.add('active');
                }
            };
            
            // 关闭弹窗
            if (cancelAddBtn) {
                cancelAddBtn.addEventListener('click', function() {
                    if (addModal) {
                        addModal.classList.remove('active');
                    }
                });
            }
            
            // 点击遮罩层关闭弹窗
            if (addModal) {
                addModal.addEventListener('click', function(e) {
                    if (e.target === addModal) {
                        addModal.classList.remove('active');
                    }
                });
            }
            
            // 上传区域点击事件
            const uploadArea = document.querySelector('.turquoise-upload-area');
            const fileInput = document.querySelector('input[type="file"]');
            
            if (uploadArea && fileInput) {
                uploadArea.addEventListener('click', function() {
                    fileInput.click();
                });
                
                fileInput.addEventListener('change', function(e) {
                    if (e.target.files.length > 0) {
                        alert('文件已选择：' + e.target.files[0].name);
                    }
                });
                
                // 拖拽上传
                uploadArea.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    uploadArea.style.borderColor = '#4A90E2';
                });
                
                uploadArea.addEventListener('dragleave', function() {
                    uploadArea.style.borderColor = '#d1d5db';
                });
                
                uploadArea.addEventListener('drop', function(e) {
                    e.preventDefault();
                    uploadArea.style.borderColor = '#d1d5db';
                    if (e.dataTransfer.files.length > 0) {
                        fileInput.files = e.dataTransfer.files;
                        alert('文件已选择：' + e.dataTransfer.files[0].name);
                    }
                });
            }
            
            // 检查URL参数，是否需要自动弹出添加商品弹窗
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('showAddModal') === 'true') {
                console.log('URL参数包含showAddModal=true，自动弹出添加商品弹窗');
                setTimeout(function() {
                    window.openAddProductModal();
                }, 100);
            }
        });
        
        // 重置搜索表单
        function resetSearchForm() {
            // 清空搜索表单
            document.querySelector('input[name="keyword"]').value = '';
            document.querySelector('select[name="categoryId"]').value = '';
            document.querySelector('select[name="status"]').value = '';
            
            // 提交表单重新查询
            document.querySelector('form').submit();
        }
    </script>
</body>
