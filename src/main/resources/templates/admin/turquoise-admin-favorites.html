<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>收藏分析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
            padding: 20px;
        }
        .turquoise-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .turquoise-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .turquoise-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
        }
        .turquoise-search-bar {
            display: flex;
            gap: 10px;
        }
        .turquoise-input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            width: 200px;
        }
        .turquoise-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }
        .turquoise-btn-blue {
            background-color: #1890ff;
            color: white;
        }
        .turquoise-btn-blue:hover {
            background-color: #40a9ff;
        }
        .turquoise-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .turquoise-table th,
        .turquoise-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        .turquoise-table th {
            background-color: #fafafa;
            font-weight: 600;
            color: #666;
        }
        .turquoise-table tr:hover {
            background-color: #f9f9f9;
        }
        .turquoise-pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
        }
        .turquoise-page-btn {
            padding: 6px 12px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            border-radius: 4px;
        }
        .turquoise-page-btn:hover:not(:disabled) {
            border-color: #1890ff;
            color: #1890ff;
        }
        .turquoise-page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .turquoise-page-info {
            color: #666;
            font-size: 14px;
        }
        .turquoise-tab-header {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .turquoise-tab-item {
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            color: #666;
        }
        .turquoise-tab-item.active {
            color: #1890ff;
            border-bottom-color: #1890ff;
        }
    </style>
</head>
<body>
    <div class="turquoise-container">
        <div class="turquoise-header">
            <h1 class="turquoise-title">收藏分析</h1>
            <div class="turquoise-search-bar">
                <input type="text" class="turquoise-input" id="searchKeyword" placeholder="搜索商品名称/用户昵称" th:value="${keyword}">
                <button class="turquoise-btn turquoise-btn-blue" onclick="searchFavorites()">搜索</button>
            </div>
        </div>

        <div class="turquoise-tab-header">
            <div class="turquoise-tab-item" onclick="window.location.href='/admin/users'">会员列表</div>
            <div class="turquoise-tab-item active">收藏分析</div>
        </div>

        <table class="turquoise-table">
            <thead>
                <tr>
                    <th>用户昵称</th>
                    <th>收藏商品</th>
                    <th>收藏时间</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="favorite : ${favorites}">
                    <td th:text="${favorite.nick_name}"></td>
                    <td th:text="${favorite.goods_name}"></td>
                    <td th:text="${#dates.format(favorite.collect_time, 'yyyy-MM-dd HH:mm:ss')}"></td>
                </tr>
                <tr th:if="${favorites == null or favorites.isEmpty()}">
                    <td colspan="3" style="text-align: center; color: #999;">暂无收藏数据</td>
                </tr>
            </tbody>
        </table>

        <div id="pagination">
            <div class="turquoise-pagination">
                <button class="turquoise-page-btn" id="btnPrev" th:disabled="${pageResult.currPage <= 1}">上一页</button>
                <span class="turquoise-page-info">第 <span id="currPage" th:text="${pageResult.currPage}">1</span> 页 / 共 <span id="totalPage" th:text="${pageResult.totalPage}">1</span> 页</span>
                <button class="turquoise-page-btn" id="btnNext" th:disabled="${pageResult.currPage >= pageResult.totalPage}">下一页</button>
            </div>
        </div>
    </div>

    <script>
        function searchFavorites() {
            const keyword = document.getElementById('searchKeyword').value;
            window.location.href = '/admin/users/favorite?keyword=' + encodeURIComponent(keyword);
        }

        function goPage(pageNum) {
            const keyword = document.getElementById('searchKeyword').value;
            let url = '/admin/users/favorite?page=' + pageNum;
            if (keyword) {
                url += '&keyword=' + encodeURIComponent(keyword);
            }
            window.location.href = url;
        }

        document.getElementById('btnPrev').addEventListener('click', function() {
            const currPage = parseInt(document.getElementById('currPage').textContent);
            if (currPage > 1) {
                goPage(currPage - 1);
            }
        });

        document.getElementById('btnNext').addEventListener('click', function() {
            const currPage = parseInt(document.getElementById('currPage').textContent);
            const totalPage = parseInt(document.getElementById('totalPage').textContent);
            if (currPage < totalPage) {
                goPage(currPage + 1);
            }
        });
    </script>
</body>
</html>
