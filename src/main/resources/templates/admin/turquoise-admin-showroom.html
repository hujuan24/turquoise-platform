<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>展厅管理 - 后台管理</title>
    <link rel="stylesheet" th:href="@{/admin/css/turquoise-admin.css}">
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }
        
        .btn {
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }
        
        .btn-primary {
            background: #1abc9c;
            color: #fff;
        }
        
        .btn-primary:hover {
            background: #16a085;
        }
        
        .btn-danger {
            background: #e74c3c;
            color: #fff;
        }
        
        .btn-danger:hover {
            background: #c0392b;
        }
        
        .btn-sm {
            padding: 4px 12px;
            font-size: 12px;
        }
        
        .btn-success {
            background: #27ae60;
            color: #fff;
        }
        
        .btn-success:hover {
            background: #1e8449;
        }
        
        .btn-warning {
            background: #f39c12;
            color: #fff;
        }
        
        .btn-warning:hover {
            background: #d68910;
        }
        
        .search-bar {
            background: #fff;
            border-radius: 8px;
            padding: 16px 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .search-bar input {
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            min-width: 250px;
        }
        
        .search-bar input:focus {
            outline: none;
            border-color: #1abc9c;
        }
        
        .data-table {
            width: 100%;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }
        
        .data-table thead tr {
            background: #f8f9fa;
        }
        
        .data-table th {
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            color: #555;
            font-size: 14px;
            border-bottom: 1px solid #eee;
        }
        
        .data-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
            color: #666;
        }
        
        .data-table tbody tr:hover {
            background: #fafafa;
        }
        
        .cover-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-badge.active {
            background: #d4edda;
            color: #155724;
        }
        
        .status-badge.inactive {
            background: #f8d7da;
            color: #721c24;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .pagination {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        
        .pagination a, .pagination span {
            padding: 8px 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-decoration: none;
            color: #666;
            font-size: 14px;
        }
        
        .pagination a:hover {
            background: #f5f5f5;
        }
        
        .pagination .active {
            background: #1abc9c;
            color: #fff;
            border-color: #1abc9c;
        }
        
        .pagination-info {
            margin-left: 16px;
            color: #999;
            font-size: 14px;
        }
        
        /* 弹窗样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal {
            background: #fff;
            border-radius: 8px;
            width: 500px;
            max-width: 90%;
            overflow: hidden;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #eee;
        }
        
        .modal-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #999;
        }
        
        .modal-body {
            padding: 20px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
            color: #555;
        }
        
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }
        
        .form-group textarea {
            height: 100px;
            resize: vertical;
        }
        
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #1abc9c;
        }
        
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding: 16px 20px;
            border-top: 1px solid #eee;
        }
        
        .btn-default {
            background: #f5f5f5;
            color: #666;
        }
        
        .btn-default:hover {
            background: #eee;
        }
    </style>
</head>
<body>
    <div th:replace="admin/turquoise-admin-layout :: header"></div>
    <div th:replace="admin/turquoise-admin-layout :: sidebar"></div>
    <main class="turquoise-content">
        <div class="turquoise-page">
            <div class="page-header">
                <h2 class="page-title">展厅管理</h2>
                <button class="btn btn-primary" onclick="openAddModal()">新增展厅</button>
            </div>

            <!-- 搜索栏 -->
            <div class="search-bar">
                <input type="text" id="searchName" placeholder="搜索展厅名称" th:value="${showroomName}">
                <button class="btn btn-primary" onclick="search()">搜索</button>
            </div>

            <!-- 展厅列表 -->
            <table class="data-table">
                <thead>
                    <tr>
                        <th>展厅ID</th>
                        <th>展厅名称</th>
                        <th>封面</th>
                        <th>简介</th>
                        <th>排序</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <th:block th:if="${showroomList != null and not showroomList.isEmpty()}">
                        <tr th:each="showroom : ${showroomList}">
                            <td th:text="${showroom.showroomId}"></td>
                            <td th:text="${showroom.showroomName}"></td>
                            <td>
                                <img th:if="${showroom.coverImg}" th:src="${showroom.coverImg}" class="cover-img" />
                                <span th:else>-</span>
                            </td>
                            <td th:text="${showroom.showroomDesc} != null ? showroom.showroomDesc : '-'"></td>
                            <td th:text="${showroom.sort} != null ? showroom.sort : 0"></td>
                            <td>
                                <span class="status-badge" th:class="${showroom.status == 1 ? 'active' : 'inactive'}">
                                    [[${showroom.status == 1 ? '正常' : '禁用'}]]
                                </span>
                            </td>
                            <td>
                                <button class="btn btn-primary btn-sm" th:onclick="|openEditModal(${showroom.showroomId})|">编辑</button>
                                <button class="btn btn-danger btn-sm" th:onclick="|deleteShowroom(${showroom.showroomId})|">删除</button>
                                <button th:if="${showroom.status == 1}" class="btn btn-warning btn-sm" th:onclick="|updateStatus(${showroom.showroomId}, 0)|">禁用</button>
                                <button th:if="${showroom.status == 0}" class="btn btn-success btn-sm" th:onclick="|updateStatus(${showroom.showroomId}, 1)|">启用</button>
                            </td>
                        </tr>
                    </th:block>
                    <tr th:if="${showroomList == null or showroomList.isEmpty()}">
                        <td colspan="7">
                            <div class="empty-state">
                                <i class="fa fa-building"></i>
                                <p>暂无展厅数据</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- 分页 -->
            <div class="pagination">
                <a th:href="@{/admin/content/showroom(page=${page-1}, showroomName=${showroomName})}" th:if="${page > 1}">上一页</a>
                <span th:else class="pagination-disabled">上一页</span>
                <span class="active" th:text="${page}"></span>
                <a th:href="@{/admin/content/showroom(page=${page+1}, showroomName=${showroomName})}" th:if="${(page * limit) < total}">下一页</a>
                <span th:else class="pagination-disabled">下一页</span>
                <span class="pagination-info">共 <span th:text="${total}"></span> 条记录</span>
            </div>
        </div>
    </main>

    <!-- 新增/编辑弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">新增展厅</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="showroomForm">
                    <input type="hidden" id="showroomId">
                    <div class="form-group">
                        <label>展厅名称</label>
                        <input type="text" id="showroomName" required>
                    </div>
                    <div class="form-group">
                        <label>展厅简介</label>
                        <textarea id="showroomDesc"></textarea>
                    </div>
                    <div class="form-group">
                        <label>封面图片URL</label>
                        <input type="text" id="coverImg" placeholder="请输入图片URL">
                    </div>
                    <div class="form-group">
                        <label>排序</label>
                        <input type="number" id="sort" value="0">
                    </div>
                    <div class="form-group">
                        <label>状态</label>
                        <select id="status">
                            <option value="1">正常</option>
                            <option value="0">禁用</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveShowroom()">保存</button>
            </div>
        </div>
    </div>

    <th:block th:replace="admin/turquoise-admin-layout :: admin-script"></th:block>

    <script>
        // 打开新增弹窗
        function openAddModal() {
            document.getElementById('modalTitle').textContent = '新增展厅';
            document.getElementById('showroomForm').reset();
            document.getElementById('showroomId').value = '';
            document.getElementById('sort').value = '0';
            document.getElementById('status').value = '1';
            document.getElementById('modalOverlay').classList.add('show');
        }

        // 打开编辑弹窗
        function openEditModal(id) {
            fetch('/admin/content/showroom/get/' + id)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('modalTitle').textContent = '编辑展厅';
                    document.getElementById('showroomId').value = data.showroomId;
                    document.getElementById('showroomName').value = data.showroomName || '';
                    document.getElementById('showroomDesc').value = data.showroomDesc || '';
                    document.getElementById('coverImg').value = data.coverImg || '';
                    document.getElementById('sort').value = data.sort || '0';
                    document.getElementById('status').value = data.status;
                    document.getElementById('modalOverlay').classList.add('show');
                });
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
        }

        // 保存展厅
        function saveShowroom() {
            const id = document.getElementById('showroomId').value;
            const data = {
                showroomId: id ? parseInt(id) : null,
                showroomName: document.getElementById('showroomName').value,
                showroomDesc: document.getElementById('showroomDesc').value,
                coverImg: document.getElementById('coverImg').value,
                sort: parseInt(document.getElementById('sort').value),
                status: parseInt(document.getElementById('status').value)
            };

            const url = id ? '/admin/content/showroom/update' : '/admin/content/showroom/add';
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(response => response.json())
              .then(result => {
                  alert(result.message);
                  if (result.success) {
                      closeModal();
                      location.reload();
                  }
              });
        }

        // 删除展厅
        function deleteShowroom(id) {
            if (confirm('确定要删除这个展厅吗？')) {
                fetch('/admin/content/showroom/delete/' + id, { method: 'POST' })
                    .then(response => response.json())
                    .then(result => {
                        alert(result.message);
                        if (result.success) {
                            location.reload();
                        }
                    });
            }
        }

        // 更新状态
        function updateStatus(id, status) {
            const statusText = status === 1 ? '启用' : '禁用';
            if (confirm('确定要' + statusText + '这个展厅吗？')) {
                fetch('/admin/content/showroom/status/' + id + '?status=' + status, { method: 'POST' })
                    .then(response => response.json())
                    .then(result => {
                        alert(result.message);
                        if (result.success) {
                            location.reload();
                        }
                    });
            }
        }

        // 搜索
        function search() {
            const name = document.getElementById('searchName').value;
            location.href = '/admin/content/showroom?showroomName=' + encodeURIComponent(name);
        }

        // ESC关闭弹窗
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
