<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>松石雅集 - 管理后台</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" th:href="@{/css/admin-login.css}">
</head>
<body>
  <div class="login-card">
    <div class="card-header">
      <div class="brand-logo">
        <i class="fas fa-gem"></i>
        <span class="brand-name">松石雅集</span>
      </div>
      <p class="brand-subtitle">管理后台</p>
    </div>

    <div class="tab-container">
      <button class="tab-btn active" data-tab="login" onclick="switchTab('login')">登录</button>
      <button class="tab-btn" data-tab="register" onclick="switchTab('register')">注册</button>
    </div>

    <div class="form-container">
      <!-- 登录表单 -->
      <div id="loginForm" class="form-panel">
        <form th:action="@{/admin/login}" method="post">
          <div class="input-group">
            <i class="fas fa-user icon-prefix"></i>
            <input type="text" name="username" placeholder="用户名" required>
          </div>

          <div class="input-group">
            <i class="fas fa-lock icon-prefix"></i>
            <input type="password" name="password" placeholder="密码" required>
          </div>

          <div class="input-group">
            <i class="fas fa-user-tag icon-prefix"></i>
            <select name="role" required>
              <option value="admin">管理员</option>
              <option value="appraiser">鉴定人员</option>
            </select>
            <i class="fas fa-chevron-down select-arrow"></i>
          </div>

          <button type="submit" class="submit-btn" id="loginBtn">登 录</button>

          <div class="forgot-link">
            <a href="#">忘记密码？</a>
          </div>
        </form>
      </div>

      <!-- 注册表单 -->
      <div id="registerForm" class="form-panel hidden">
        <form onsubmit="handleRegister(event)">
          <div class="input-group">
            <i class="fas fa-user icon-prefix"></i>
            <input type="text" name="username" placeholder="用户名" required>
          </div>

          <div class="input-group">
            <i class="fas fa-phone icon-prefix"></i>
            <input type="tel" name="phone" placeholder="手机号" required>
          </div>

          <div class="input-group">
            <i class="fas fa-lock icon-prefix"></i>
            <input type="password" name="password" placeholder="密码" required>
          </div>

          <div class="input-group">
            <i class="fas fa-lock icon-prefix"></i>
            <input type="password" name="confirmPassword" placeholder="确认密码" required>
          </div>

          <div class="input-group">
            <i class="fas fa-user-tag icon-prefix"></i>
            <select name="role" required>
              <option value="admin">管理员</option>
              <option value="appraiser">鉴定人员</option>
            </select>
            <i class="fas fa-chevron-down select-arrow"></i>
          </div>

          <button type="submit" class="submit-btn" id="registerBtn">注 册</button>

          <div class="form-footer">
            <span class="text-muted">已有账号？</span>
            <button type="button" onclick="switchTab('login')">立即登录</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    let currentTab = 'login';

    function switchTab(tab) {
      if (tab === currentTab) return;

      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      const tabs = document.querySelectorAll('.turquoise-tab-btn');

      tabs.forEach(t => t.classList.remove('active'));
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');

      if (tab === 'login') {
        registerForm.classList.add('hidden');
        loginForm.classList.remove('hidden');
        loginForm.classList.add('slide-in-left');
        setTimeout(() => loginForm.classList.remove('slide-in-left'), 300);
      } else {
        loginForm.classList.add('hidden');
        registerForm.classList.remove('hidden');
        registerForm.classList.add('slide-in-right');
        setTimeout(() => registerForm.classList.remove('slide-in-right'), 300);
      }

      currentTab = tab;
    }

    function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      const originalText = btn.innerHTML;
      
      const formData = new FormData(e.target);
      if (formData.get('password') !== formData.get('confirmPassword')) {
        alert('两次输入的密码不一致！');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="turquoise-spinner"><i class="fas fa-spinner"></i></span> 处理中...';

      setTimeout(() => {
        console.log('注册数据:', {
          username: formData.get('username'),
          phone: formData.get('phone'),
          password: formData.get('password'),
          role: formData.get('role')
        });
        
        btn.disabled = false;
        btn.innerHTML = originalText;
        alert('注册成功！');
        switchTab('login');
      }, 1500);
    }
  </script>
</body>
</html>
