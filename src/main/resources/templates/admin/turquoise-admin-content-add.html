<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="admin/turquoise-admin-layout :: admin-head"></th:block>
</head>
<body>
    <th:block th:replace="admin/turquoise-admin-layout :: header"></th:block>
    <th:block th:replace="admin/turquoise-admin-layout :: sidebar"></th:block>
    
    <main class="turquoise-content">
        <div class="turquoise-page">
            <div class="turquoise-page-header">
                <h2 class="turquoise-page-title">添加内容</h2>
                <a href="/admin/content" class="turquoise-btn turquoise-btn-primary">返回列表</a>
            </div>
            
            <!-- 表单 -->
            <div class="turquoise-card">
                <div class="turquoise-card-content">
                    <form id="contentForm">
                        <div class="turquoise-form-row">
                            <div class="turquoise-form-item">
                                <label class="turquoise-form-label">标题：</label>
                                <input type="text" id="title" name="title" class="turquoise-input" placeholder="请输入标题">
                            </div>
                        </div>
                        <div class="turquoise-form-row">
                            <div class="turquoise-form-item">
                                <label class="turquoise-form-label">分类：</label>
                                <select id="category" name="category" class="turquoise-select">
                                    <option value="1">新闻资讯</option>
                                    <option value="2">行业动态</option>
                                    <option value="3">品牌故事</option>
                                </select>
                            </div>
                        </div>
                        <div class="turquoise-form-row">
                            <div class="turquoise-form-item">
                                <label class="turquoise-form-label">内容：</label>
                                <textarea id="content" name="content" class="turquoise-textarea" rows="10" placeholder="请输入内容"></textarea>
                            </div>
                        </div>
                        <div class="turquoise-form-row">
                            <div class="turquoise-form-item">
                                <label class="turquoise-form-label">状态：</label>
                                <label class="turquoise-radio">
                                    <input type="radio" name="status" value="1" checked> 发布
                                </label>
                                <label class="turquoise-radio">
                                    <input type="radio" name="status" value="0"> 草稿
                                </label>
                            </div>
                        </div>
                        <div class="turquoise-form-row">
                            <div class="turquoise-form-item">
                                <button type="button" id="saveBtn" class="turquoise-btn turquoise-btn-primary">保存</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
    
    <th:block th:replace="admin/turquoise-admin-layout :: admin-script"></th:block>
    
    <script>
        document.getElementById('saveBtn').addEventListener('click', function() {
            const title = document.getElementById('title').value;
            const category = document.getElementById('category').value;
            const content = document.getElementById('content').value;
            const status = document.querySelector('input[name="status"]:checked').value;
            
            if (!title) {
                alert('请输入标题');
                return;
            }
            
            if (!content) {
                alert('请输入内容');
                return;
            }
            
            const formData = {
                title: title,
                category: category,
                content: content,
                status: parseInt(status)
            };
            
            fetch('/admin/content/save', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.resultCode === 200) {
                    alert(data.message || '保存成功');
                    location.href = '/admin/content';
                } else {
                    alert(data.message || '保存失败');
                }
            })
            .catch(error => {
                console.error('保存失败：', error);
                alert('保存失败，请重试');
            });
        });
    </script>
</body>
</html>
