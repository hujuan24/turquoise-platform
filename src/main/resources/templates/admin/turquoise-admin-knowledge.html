<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>知识库 - 后台管理</title>
    <link rel="stylesheet" th:href="@{/admin/css/turquoise-admin.css}">
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }
        
        .btn {
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }
        
        .btn-primary {
            background: #1abc9c;
            color: #fff;
        }
        
        .btn-primary:hover {
            background: #16a085;
        }
        
        .btn-danger {
            background: #e74c3c;
            color: #fff;
        }
        
        .btn-danger:hover {
            background: #c0392b;
        }
        
        .btn-sm {
            padding: 4px 12px;
            font-size: 12px;
        }
        
        .btn-success {
            background: #27ae60;
            color: #fff;
        }
        
        .btn-success:hover {
            background: #1e8449;
        }
        
        .btn-warning {
            background: #f39c12;
            color: #fff;
        }
        
        .btn-warning:hover {
            background: #d68910;
        }
        
        .search-bar {
            background: #fff;
            border-radius: 8px;
            padding: 16px 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .search-bar input, .search-bar select {
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            min-width: 200px;
        }
        
        .search-bar input:focus, .search-bar select:focus {
            outline: none;
            border-color: #1abc9c;
        }
        
        .data-table {
            width: 100%;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }
        
        .data-table thead tr {
            background: #f8f9fa;
        }
        
        .data-table th {
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            color: #555;
            font-size: 14px;
            border-bottom: 1px solid #eee;
        }
        
        .data-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
            color: #666;
        }
        
        .data-table tbody tr:hover {
            background: #fafafa;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-badge.draft {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-badge.published {
            background: #d4edda;
            color: #155724;
        }
        
        .status-badge.offline {
            background: #f8d7da;
            color: #721c24;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .pagination {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        
        .pagination a, .pagination span {
            padding: 8px 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-decoration: none;
            color: #666;
            font-size: 14px;
        }
        
        .pagination a:hover {
            background: #f5f5f5;
        }
        
        .pagination .active {
            background: #1abc9c;
            color: #fff;
            border-color: #1abc9c;
        }
        
        .pagination-info {
            margin-left: 16px;
            color: #999;
            font-size: 14px;
        }
        
        /* 弹窗样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal {
            background: #fff;
            border-radius: 8px;
            width: 600px;
            max-width: 90%;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #eee;
            flex-shrink: 0;
        }
        
        .modal-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #999;
        }
        
        .modal-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
            color: #555;
        }
        
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }
        
        .form-group textarea {
            height: 150px;
            resize: vertical;
        }
        
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #1abc9c;
        }
        
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding: 16px 20px;
            border-top: 1px solid #eee;
            flex-shrink: 0;
        }
        
        .btn-default {
            background: #f5f5f5;
            color: #666;
        }
        
        .btn-default:hover {
            background: #eee;
        }
    </style>
</head>
<body>
    <div th:replace="admin/turquoise-admin-layout :: header"></div>
    <div th:replace="admin/turquoise-admin-layout :: sidebar"></div>
    <main class="turquoise-content">
        <div class="turquoise-page">
            <div class="page-header">
                <h2 class="page-title">知识库</h2>
                <button class="btn btn-primary" onclick="openAddModal()">新增文章</button>
            </div>

            <!-- 搜索栏 -->
            <div class="search-bar">
                <input type="text" id="searchTitle" placeholder="搜索文章标题" th:value="${title}">
                <select id="searchCategory" th:value="${category}">
                    <option value="">全部分类</option>
                    <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"></option>
                </select>
                <button class="btn btn-primary" onclick="search()">搜索</button>
            </div>

            <!-- 知识库列表 -->
            <table class="data-table">
                <thead>
                    <tr>
                        <th>文章ID</th>
                        <th>标题</th>
                        <th>分类</th>
                        <th>作者</th>
                        <th>浏览量</th>
                        <th>状态</th>
                        <th>发布时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <th:block th:if="${knowledgeList != null and not knowledgeList.isEmpty()}">
                        <tr th:each="knowledge : ${knowledgeList}">
                            <td th:text="${knowledge.knowledgeId}"></td>
                            <td th:text="${knowledge.title}"></td>
                            <td th:text="${knowledge.category != null ? knowledge.category : '-'}"></td>
                            <td th:text="${knowledge.author != null ? knowledge.author : '-'}"></td>
                            <td th:text="${knowledge.viewCount != null ? knowledge.viewCount : 0}"></td>
                            <td>
                                <span class="status-badge" 
                                      th:class="${knowledge.status == 0 ? 'draft' : (knowledge.status == 1 ? 'published' : 'offline')}">
                                    [[${knowledge.status == 0 ? '草稿' : (knowledge.status == 1 ? '已发布' : '已下架')}]]
                                </span>
                            </td>
                            <td th:text="${knowledge.createTime}"></td>
                            <td>
                                <button class="btn btn-primary btn-sm" th:onclick="|openEditModal(${knowledge.knowledgeId})|">编辑</button>
                                <button class="btn btn-danger btn-sm" th:onclick="|deleteKnowledge(${knowledge.knowledgeId})|">删除</button>
                                <button th:if="${knowledge.status == 0}" class="btn btn-success btn-sm" th:onclick="|updateStatus(${knowledge.knowledgeId}, 1)|">发布</button>
                                <button th:if="${knowledge.status == 1}" class="btn btn-warning btn-sm" th:onclick="|updateStatus(${knowledge.knowledgeId}, 2)|">下架</button>
                                <button th:if="${knowledge.status == 2}" class="btn btn-success btn-sm" th:onclick="|updateStatus(${knowledge.knowledgeId}, 1)|">重新发布</button>
                            </td>
                        </tr>
                    </th:block>
                    <tr th:if="${knowledgeList == null or knowledgeList.isEmpty()}">
                        <td colspan="8">
                            <div class="empty-state">
                                <i class="fa fa-book"></i>
                                <p>暂无文章数据</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- 分页 -->
            <div class="pagination">
                <a th:href="@{/admin/content/knowledge(page=${page-1}, title=${title}, category=${category})}" th:if="${page > 1}">上一页</a>
                <span th:else class="pagination-disabled">上一页</span>
                <span class="active" th:text="${page}"></span>
                <a th:href="@{/admin/content/knowledge(page=${page+1}, title=${title}, category=${category})}" th:if="${(page * limit) < total}">下一页</a>
                <span th:else class="pagination-disabled">下一页</span>
                <span class="pagination-info">共 <span th:text="${total}"></span> 条记录</span>
            </div>
        </div>
    </main>

    <!-- 新增/编辑弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">新增文章</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="knowledgeForm">
                    <input type="hidden" id="knowledgeId">
                    <div class="form-group">
                        <label>文章标题</label>
                        <input type="text" id="title" required>
                    </div>
                    <div class="form-group">
                        <label>分类</label>
                        <select id="category">
                            <option value="">请选择分类</option>
                            <option value="绿松石鉴别">绿松石鉴别</option>
                            <option value="保养知识">保养知识</option>
                            <option value="历史文化">历史文化</option>
                            <option value="市场行情">市场行情</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>作者</label>
                        <input type="text" id="author">
                    </div>
                    <div class="form-group">
                        <label>封面图片URL</label>
                        <input type="text" id="coverImg" placeholder="请输入图片URL">
                    </div>
                    <div class="form-group">
                        <label>文章内容</label>
                        <textarea id="content"></textarea>
                    </div>
                    <div class="form-group">
                        <label>状态</label>
                        <select id="status">
                            <option value="0">草稿</option>
                            <option value="1">已发布</option>
                            <option value="2">已下架</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveKnowledge()">保存</button>
            </div>
        </div>
    </div>

    <th:block th:replace="admin/turquoise-admin-layout :: admin-script"></th:block>

    <script>
        // 打开新增弹窗
        function openAddModal() {
            document.getElementById('modalTitle').textContent = '新增文章';
            document.getElementById('knowledgeForm').reset();
            document.getElementById('knowledgeId').value = '';
            document.getElementById('status').value = '0';
            document.getElementById('modalOverlay').classList.add('show');
        }

        // 打开编辑弹窗
        function openEditModal(id) {
            fetch('/admin/content/knowledge/get/' + id)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('modalTitle').textContent = '编辑文章';
                    document.getElementById('knowledgeId').value = data.knowledgeId;
                    document.getElementById('title').value = data.title || '';
                    document.getElementById('category').value = data.category || '';
                    document.getElementById('author').value = data.author || '';
                    document.getElementById('coverImg').value = data.coverImg || '';
                    document.getElementById('content').value = data.content || '';
                    document.getElementById('status').value = data.status;
                    document.getElementById('modalOverlay').classList.add('show');
                });
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
        }

        // 保存文章
        function saveKnowledge() {
            const id = document.getElementById('knowledgeId').value;
            const data = {
                knowledgeId: id ? parseInt(id) : null,
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                author: document.getElementById('author').value,
                coverImg: document.getElementById('coverImg').value,
                content: document.getElementById('content').value,
                status: parseInt(document.getElementById('status').value)
            };

            const url = id ? '/admin/content/knowledge/update' : '/admin/content/knowledge/add';
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(response => response.json())
              .then(result => {
                  alert(result.message);
                  if (result.success) {
                      closeModal();
                      location.reload();
                  }
              });
        }

        // 删除文章
        function deleteKnowledge(id) {
            if (confirm('确定要删除这篇文章吗？')) {
                fetch('/admin/content/knowledge/delete/' + id, { method: 'POST' })
                    .then(response => response.json())
                    .then(result => {
                        alert(result.message);
                        if (result.success) {
                            location.reload();
                        }
                    });
            }
        }

        // 更新状态
        function updateStatus(id, status) {
            const statusText = status === 0 ? '设为草稿' : (status === 1 ? '发布' : '下架');
            if (confirm('确定要' + statusText + '这篇文章吗？')) {
                fetch('/admin/content/knowledge/status/' + id + '?status=' + status, { method: 'POST' })
                    .then(response => response.json())
                    .then(result => {
                        alert(result.message);
                        if (result.success) {
                            location.reload();
                        }
                    });
            }
        }

        // 搜索
        function search() {
            const title = document.getElementById('searchTitle').value;
            const category = document.getElementById('searchCategory').value;
            let url = '/admin/content/knowledge';
            const params = [];
            if (title) params.push('title=' + encodeURIComponent(title));
            if (category) params.push('category=' + encodeURIComponent(category));
            if (params.length > 0) url += '?' + params.join('&');
            location.href = url;
        }

        // ESC关闭弹窗
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
