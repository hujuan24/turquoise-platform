<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>论坛管理 - 后台管理</title>
    <link rel="stylesheet" th:href="@{/admin/css/turquoise-admin.css}">
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }
        
        .btn {
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }
        
        .btn-primary {
            background: #1abc9c;
            color: #fff;
        }
        
        .btn-primary:hover {
            background: #16a085;
        }
        
        .btn-danger {
            background: #e74c3c;
            color: #fff;
        }
        
        .btn-danger:hover {
            background: #c0392b;
        }
        
        .btn-sm {
            padding: 4px 12px;
            font-size: 12px;
        }
        
        .btn-success {
            background: #27ae60;
            color: #fff;
        }
        
        .btn-success:hover {
            background: #1e8449;
        }
        
        .btn-warning {
            background: #f39c12;
            color: #fff;
        }
        
        .btn-warning:hover {
            background: #d68910;
        }
        
        .search-bar {
            background: #fff;
            border-radius: 8px;
            padding: 16px 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .search-bar input, .search-bar select {
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            min-width: 200px;
        }
        
        .search-bar input:focus, .search-bar select:focus {
            outline: none;
            border-color: #1abc9c;
        }
        
        .data-table {
            width: 100%;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }
        
        .data-table thead tr {
            background: #f8f9fa;
        }
        
        .data-table th {
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            color: #555;
            font-size: 14px;
            border-bottom: 1px solid #eee;
        }
        
        .data-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
            color: #666;
        }
        
        .data-table tbody tr:hover {
            background: #fafafa;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-badge.normal {
            background: #d4edda;
            color: #155724;
        }
        
        .status-badge.blocked {
            background: #f8d7da;
            color: #721c24;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .pagination {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        
        .pagination a, .pagination span {
            padding: 8px 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-decoration: none;
            color: #666;
            font-size: 14px;
        }
        
        .pagination a:hover {
            background: #f5f5f5;
        }
        
        .pagination .active {
            background: #1abc9c;
            color: #fff;
            border-color: #1abc9c;
        }
        
        .pagination-info {
            margin-left: 16px;
            color: #999;
            font-size: 14px;
        }
        
        /* 详情弹窗样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal {
            background: #fff;
            border-radius: 8px;
            width: 700px;
            max-width: 90%;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #eee;
            flex-shrink: 0;
        }
        
        .modal-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #999;
        }
        
        .modal-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }
        
        .detail-item {
            margin-bottom: 16px;
        }
        
        .detail-label {
            font-weight: 500;
            color: #555;
            margin-bottom: 4px;
        }
        
        .detail-value {
            color: #666;
            line-height: 1.6;
        }
        
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding: 16px 20px;
            border-top: 1px solid #eee;
            flex-shrink: 0;
        }
        
        .btn-default {
            background: #f5f5f5;
            color: #666;
        }
        
        .btn-default:hover {
            background: #eee;
        }
    </style>
</head>
<body>
    <div th:replace="admin/turquoise-admin-layout :: header"></div>
    <div th:replace="admin/turquoise-admin-layout :: sidebar"></div>
    <main class="turquoise-content">
        <div class="turquoise-page">
            <div class="page-header">
                <h2 class="page-title">论坛管理</h2>
            </div>

            <!-- 搜索栏 -->
            <div class="search-bar">
                <input type="text" id="searchTitle" placeholder="搜索帖子标题" th:value="${title}">
                <select id="searchStatus" th:value="${status}">
                    <option value="">全部状态</option>
                    <option value="1">正常</option>
                    <option value="0">屏蔽</option>
                </select>
                <button class="btn btn-primary" onclick="search()">搜索</button>
            </div>

            <!-- 帖子列表 -->
            <table class="data-table">
                <thead>
                    <tr>
                        <th>帖子ID</th>
                        <th>标题</th>
                        <th>作者</th>
                        <th>浏览量</th>
                        <th>回复数</th>
                        <th>发布时间</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <th:block th:if="${postList != null and not postList.isEmpty()}">
                        <tr th:each="post : ${postList}">
                            <td th:text="${post.postId}"></td>
                            <td th:text="${post.title}"></td>
                            <td th:text="${post.authorName != null ? post.authorName : '-'}"></td>
                            <td th:text="${post.viewCount != null ? post.viewCount : 0}"></td>
                            <td th:text="${post.replyCount != null ? post.replyCount : 0}"></td>
                            <td th:text="${post.createTime}"></td>
                            <td>
                                <span class="status-badge" th:class="${post.status == 1 ? 'normal' : 'blocked'}">
                                    [[${post.status == 1 ? '正常' : '屏蔽'}]]
                                </span>
                            </td>
                            <td>
                                <button class="btn btn-primary btn-sm" th:onclick="|openDetailModal(${post.postId})|">查看</button>
                                <button class="btn btn-danger btn-sm" th:onclick="|deletePost(${post.postId})|">删除</button>
                                <button th:if="${post.status == 1}" class="btn btn-warning btn-sm" th:onclick="|updateStatus(${post.postId}, 0)|">屏蔽</button>
                                <button th:if="${post.status == 0}" class="btn btn-success btn-sm" th:onclick="|updateStatus(${post.postId}, 1)|">解除屏蔽</button>
                            </td>
                        </tr>
                    </th:block>
                    <tr th:if="${postList == null or postList.isEmpty()}">
                        <td colspan="8">
                            <div class="empty-state">
                                <i class="fa fa-comments"></i>
                                <p>暂无帖子数据</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- 分页 -->
            <div class="pagination">
                <a th:href="@{/admin/content/forum(page=${page-1}, title=${title}, status=${status})}" th:if="${page > 1}">上一页</a>
                <span th:else class="pagination-disabled">上一页</span>
                <span class="active" th:text="${page}"></span>
                <a th:href="@{/admin/content/forum(page=${page+1}, title=${title}, status=${status})}" th:if="${(page * limit) < total}">下一页</a>
                <span th:else class="pagination-disabled">下一页</span>
                <span class="pagination-info">共 <span th:text="${total}"></span> 条记录</span>
            </div>
        </div>
    </main>

    <!-- 详情弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">帖子详情</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalContent">
                <div class="detail-item">
                    <div class="detail-label">帖子标题</div>
                    <div class="detail-value" id="detailTitle">-</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">作者</div>
                    <div class="detail-value" id="detailAuthor">-</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">发布时间</div>
                    <div class="detail-value" id="detailTime">-</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">浏览量</div>
                    <div class="detail-value" id="detailViews">-</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">回复数</div>
                    <div class="detail-value" id="detailReplies">-</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">帖子内容</div>
                    <div class="detail-value" id="detailContent" style="white-space: pre-wrap; word-break: break-all;"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeModal()">关闭</button>
            </div>
        </div>
    </div>

    <th:block th:replace="admin/turquoise-admin-layout :: admin-script"></th:block>

    <script>
        // 打开详情弹窗
        function openDetailModal(id) {
            fetch('/admin/content/forum/detail/' + id)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('detailTitle').textContent = data.title || '-';
                    document.getElementById('detailAuthor').textContent = data.authorName || '-';
                    document.getElementById('detailTime').textContent = data.createTime || '-';
                    document.getElementById('detailViews').textContent = data.viewCount || 0;
                    document.getElementById('detailReplies').textContent = data.replyCount || 0;
                    document.getElementById('detailContent').textContent = data.content || '-';
                    document.getElementById('modalOverlay').classList.add('show');
                });
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
        }

        // 删除帖子
        function deletePost(id) {
            if (confirm('确定要删除这篇帖子吗？')) {
                fetch('/admin/content/forum/delete/' + id, { method: 'POST' })
                    .then(response => response.json())
                    .then(result => {
                        alert(result.message);
                        if (result.success) {
                            location.reload();
                        }
                    });
            }
        }

        // 更新状态
        function updateStatus(id, status) {
            const statusText = status === 1 ? '解除屏蔽' : '屏蔽';
            if (confirm('确定要' + statusText + '这篇帖子吗？')) {
                fetch('/admin/content/forum/status/' + id + '?status=' + status, { method: 'POST' })
                    .then(response => response.json())
                    .then(result => {
                        alert(result.message);
                        if (result.success) {
                            location.reload();
                        }
                    });
            }
        }

        // 搜索
        function search() {
            const title = document.getElementById('searchTitle').value;
            const status = document.getElementById('searchStatus').value;
            let url = '/admin/content/forum';
            const params = [];
            if (title) params.push('title=' + encodeURIComponent(title));
            if (status) params.push('status=' + status);
            if (params.length > 0) url += '?' + params.join('&');
            location.href = url;
        }

        // ESC关闭弹窗
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
