<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

    <meta charset="UTF-8">
    <title>十堰绿松石制品展销平台</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/mall/css/swiper-bundle.min.css}">
    <link rel="stylesheet" th:href="@{/mall/css/iconfont.css}">
    <link rel="stylesheet" th:href="@{/mall/css/common.css}">
    <link rel="stylesheet" th:href="@{/mall/styles/header.css}">
    <link rel="stylesheet" th:href="@{/mall/styles/footer.css}">
    <link rel="stylesheet" th:href="@{'/mall/styles/'+${path}+'.css'}">
    <link rel="stylesheet" th:href="@{/admin/plugins/sweetalert2/sweetalert2.min.css}"/>

</head>
<nav id="nav" th:fragment="nav-fragment">
    <div class="turquoise-banner center">
    </div>
</nav>
<header id="header" class="turquoise-header" th:fragment="header-fragment">
    <!-- 导航栏 -->
<div class="turquoise-header" id="headerNav">
    <!-- 左侧：品牌 -->
    <div class="turquoise-nav-left">
        <a href="/" class="turquoise-logo">松石雅集</a>
    </div>
    
    <!-- 中间：菜单 -->
    <ul class="turquoise-nav-links">
        <li><a th:href="@{/}">首页</a></li>
        <li><a th:href="@{/treasure}">珍宝馆</a></li>
        <li><a th:href="@{/forum}">文化论坛</a></li>
        <li><a th:href="@{/exhibition}">文化展厅</a></li>
            <li><a th:href="@{/appraisal}">鉴定服务</a></li>
    </ul>
    
    <!-- 右侧：图标 -->
    <div class="turquoise-nav-icons">
        <a th:href="@{/search}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
        </a>
        <a th:href="@{/shop-cart}" style="position: relative;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
            </svg>
            <span class="turquoise-badge" th:text="${session.newBeeMallUser?.shopCartItemCount ?: 0}">0</span>
        </a>
        <!-- 会员头像 -->
        <th:block th:unless="${session.newBeeMallUser==null}">
            <div class="turquoise-user-dropdown">
                <a class="turquoise-user-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </a>
                <div class="turquoise-dropdown-menu">
                    <a th:href="@{/personal}"><i class="fas fa-user"></i>个人中心</a>
                    <a th:href="@{/orders}"><i class="fas fa-list-alt"></i>我的订单</a>
                    <a th:href="@{/personal}"><i class="fas fa-heart"></i>我的收藏</a>
                    <div class="turquoise-divider"></div>
                    <a th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i>退出登录</a>
                </div>
            </div>
        </th:block>
        <th:block th:if="${session.newBeeMallUser==null}">
            <a th:href="@{/login}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </a>
        </th:block>
    </div>
</div>
    <script>
        // 滚动效果 - 只在首页执行
        const pathname = window.location.pathname;
        if (pathname === '/' || pathname === '/index' || document.body.classList.contains('turquoise-homepage')) {
            // 首页：添加滚动监听
            window.addEventListener('scroll', function() {
                const header = document.getElementById('header');
                if (window.scrollY > 100) {
                    header.classList.add('turquoise-scrolled');
                } else {
                    header.classList.remove('turquoise-scrolled');
                }
            });
        } else {
            // 其他页面：直接显示实色背景
            const header = document.getElementById('header');
            if (header) {
                header.classList.add('turquoise-scrolled');
            }
        }
    </script>
</header>
</html>
