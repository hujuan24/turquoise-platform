<!-- 绿松石主题珍宝馆页面 -->
<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="mall/header::head-fragment('珍宝馆 - 松石雅集','treasure')">
</head>
<body class="turquoise-homepage">
<header th:replace="mall/header::header"></header>

  <!-- 页面标题区 -->
  <header class="turquoise-page-header">
    <h1 class="turquoise-page-title">珍宝馆</h1>
    <p class="turquoise-page-subtitle">每一件绿松石，都值得被认真鉴赏</p>
  </header>

  <!-- 搜索筛选区 -->
  <section class="turquoise-filter-section">
    <div class="turquoise-search-box">
      <div class="turquoise-search-input-wrapper">
        <input type="text" class="turquoise-search-input" placeholder="搜索矿口、品类、工艺...">
        <button class="turquoise-search-btn">
          <i class="fas fa-search"></i>
        </button>
      </div>
    </div>
    <div class="turquoise-filter-bar">
      <div class="turquoise-filter-left">
        <div class="turquoise-filter-tabs">
          <button class="turquoise-filter-tab turquoise-active" onclick="switchFilter('category', this)">
            <span>按品类</span>
          </button>
          <button class="turquoise-filter-tab" onclick="switchFilter('mine', this)">
            <span>按矿口</span>
          </button>
          <button class="turquoise-filter-tab" onclick="switchFilter('color', this)">
            <span>按颜色</span>
          </button>
          <button class="turquoise-filter-tab" onclick="switchFilter('porcelain', this)">
            <span>按瓷度</span>
          </button>
        </div>
        
        <!-- 品类子选项 -->
        <div class="turquoise-sub-tabs-container" id="categorySubTabs">
          <button class="turquoise-sub-tab" onclick="switchSubFilter('category', 'wulanhua', this)">乌兰花</button>
          <button class="turquoise-sub-tab" onclick="switchSubFilter('category', 'gaocilan', this)">高瓷蓝</button>
          <button class="turquoise-sub-tab" onclick="switchSubFilter('category', 'caizihuang', this)">菜籽黄</button>
          <button class="turquoise-sub-tab" onclick="switchSubFilter('category', 'tangsancai', this)">唐三彩</button>
          <button class="turquoise-sub-tab" onclick="switchSubFilter('category', 'ningmenghuang', this)">柠檬黄</button>
          <button class="turquoise-sub-tab" onclick="switchSubFilter('category', 'ziluolan', this)">紫罗兰</button>
        </div>
        
        <!-- 矿口子选项 -->
        <div class="turquoise-sub-tabs-container" id="mineSubTabs">
          <button class="turquoise-sub-tab" onclick="switchSubFilter('mine', 'yungai', this)">云盖寺</button>
          <button class="turquoise-sub-tab" onclick="switchSubFilter('mine', 'yajiao', this)">丫角山</button>
          <button class="turquoise-sub-tab" onclick="switchSubFilter('mine', 'yunxi', this)">郧西</button>
          <button class="turquoise-sub-tab" onclick="switchSubFilter('mine', 'qinggu', this)">秦古</button>
          <button class="turquoise-sub-tab" onclick="switchSubFilter('mine', 'qita', this)">其他</button>
        </div>
        
        <!-- 颜色子选项 -->
        <div class="turquoise-sub-tabs-container" id="colorSubTabs">
          <button class="turquoise-sub-tab" onclick="switchSubFilter('color', 'tianlan', this)">天蓝</button>
          <button class="turquoise-sub-tab" onclick="switchSubFilter('color', 'lanlv', this)">蓝绿</button>
          <button class="turquoise-sub-tab" onclick="switchSubFilter('color', 'lvse', this)">绿色</button>
          <button class="turquoise-sub-tab" onclick="switchSubFilter('color', 'huangse', this)">黄色</button>
          <button class="turquoise-sub-tab" onclick="switchSubFilter('color', 'zise', this)">紫色</button>
        </div>
        
        <!-- 瓷度子选项 -->
        <div class="turquoise-sub-tabs-container" id="porcelainSubTabs">
          <button class="turquoise-sub-tab" onclick="switchSubFilter('porcelain', 'gaoci', this)">高瓷（瓷釉级）</button>
          <button class="turquoise-sub-tab" onclick="switchSubFilter('porcelain', 'zhongci', this)">中瓷（硬松级）</button>
          <button class="turquoise-sub-tab" onclick="switchSubFilter('porcelain', 'dici', this)">低瓷（泡松级）</button>
        </div>
      </div>
      <div class="turquoise-filter-right">
        <button class="turquoise-random-btn" onclick="randomRecommend()">
          <i class="fas fa-dice"></i>
          <span>帮我推荐</span>
        </button>
        <div class="turquoise-sort-dropdown">
          <select class="turquoise-sort-select" onchange="sortProducts(this.value)">
            <option value="recommend">默认推荐</option>
            <option value="newest">最新上架</option>
            <option value="hot">热度最高</option>
            <option value="price-asc">价格升序</option>
            <option value="price-desc">价格降序</option>
          </select>
        </div>
      </div>
    </div>
  </section>

  <!-- 矿口知识导购提示 -->
  <div class="turquoise-mine-guide" id="mineGuide">
    <div class="turquoise-mine-guide-text" id="mineGuideText"></div>
  </div>

  <!-- 商品列表 -->
  <section class="turquoise-product-section">
    <div class="turquoise-product-grid" id="productGrid">
      <!-- 动态商品卡片 -->
      <th:block th:if="${not #lists.isEmpty(goodsList)}">
        <th:block th:each="goods : ${goodsList}">
          <a th:href="@{'/turquoise/goods/detail/' + ${goods.goodsId}}" class="turquoise-product-link">
            <div class="turquoise-product-card" th:attr="data-id=${goods.goodsId}">
              <div class="turquoise-product-image">
                <img th:src="@{${goods.goodsCoverImg}}" th:alt="${goods.goodsName}">
                <span class="turquoise-product-badge turquoise-normal">精品</span>
                <span class="turquoise-mine-tag" th:text="${goods.turquoiseOrigin}"></span>
              </div>
              <div class="turquoise-product-info">
                <h3 class="turquoise-product-name">
                  <span class="turquoise-origin">湖北十堰</span>
                  <span class="turquoise-divider">·</span>
                  <span th:text="${goods.goodsName}"></span>
                </h3>
                <div class="turquoise-product-meta">
                  <div class="turquoise-product-specs">
                    <span>高瓷</span>
                    <span>蓝绿</span>
                  </div>
                  <div class="turquoise-product-price" th:text="|¥ ${#numbers.formatDecimal(goods.sellingPrice/100, 2, 'COMMA', 2, 'POINT')}|"></div>
                </div>
                <div class="turquoise-product-guarantee">
                  <i class="fas fa-shield-alt"></i>
                  <span>一物一证</span>
                  <div class="turquoise-guarantee-tooltip">本商品附带权威鉴定证书，支持官网核验</div>
                </div>
              </div>
            </div>
          </a>
        </th:block>
      </th:block>
      <!-- 空状态 -->
      <th:block th:if="${#lists.isEmpty(goodsList)}">
        <div class="turquoise-empty-state">
          <div class="turquoise-empty-icon">
            <i class="fas fa-gem"></i>
          </div>
          <h3 class="turquoise-empty-title">珍宝馆正在筹备中</h3>
          <p class="turquoise-empty-desc">先去首页看看吧</p>
          <a href="/" class="turquoise-back-home-btn">返回首页</a>
        </div>
      </th:block>
    </div>
  </section>

  <!-- 分页器 -->
  <div class="turquoise-pagination">
    <button class="turquoise-page-btn turquoise-prev">
      <i class="fas fa-chevron-left"></i>
      <span>上一页</span>
    </button>
    <button class="turquoise-page-btn turquoise-active">1</button>
    <button class="turquoise-page-btn">2</button>
    <button class="turquoise-page-btn">3</button>
    <span class="turquoise-page-dots">...</span>
    <button class="turquoise-page-btn">8</button>
    <button class="turquoise-page-btn turquoise-next">
      <span>下一页</span>
      <i class="fas fa-chevron-right"></i>
    </button>
  </div>

  <!-- 最近浏览 -->
  <section class="turquoise-recent-view">
    <h2 class="turquoise-recent-view-title">
      <i class="fas fa-history"></i>
      <span>最近浏览</span>
    </h2>
    <div class="turquoise-recent-view-slider" id="recentViewSlider">
      <!-- 最近浏览卡片将通过JS动态渲染 -->
    </div>
  </section>

<footer th:replace="mall/footer::footer"></footer>

  <!-- 回到顶部按钮 -->
  <div class="turquoise-back-to-top" id="backToTop">
    <i class="fas fa-chevron-up"></i>
  </div>

  <script>
    // 筛选切换
    function switchFilter(type, element) {
      // 移除所有filter-tab的active类
      document.querySelectorAll('.turquoise-filter-tab').forEach(tab => {
        tab.classList.remove('turquoise-active');
      });
      // 给当前点击的tab添加active类
      element.classList.add('turquoise-active');
      
      // 隐藏所有子选项容器
      document.querySelectorAll('.turquoise-sub-tabs-container').forEach(container => {
        container.style.display = 'none';
      });
      // 显示对应类型的子选项容器
      const subTabsContainer = document.getElementById(type + 'SubTabs');
      if (subTabsContainer) {
        subTabsContainer.style.display = 'flex';
        subTabsContainer.style.flexWrap = 'wrap';
      }
    }
    
    // 子筛选切换
    function switchSubFilter(type, value, element) {
      // 移除同类型下所有sub-tab的active类
      const subTabs = element.parentElement.querySelectorAll('.turquoise-sub-tab');
      subTabs.forEach(tab => {
        tab.classList.remove('turquoise-active');
      });
      // 给当前点击的sub-tab添加active类
      element.classList.add('turquoise-active');
      
      // 这里可以添加筛选逻辑
      console.log('筛选类型:', type, '筛选值:', value);
    }
    
    // 排序商品
    function sortProducts(value) {
      console.log('排序方式:', value);
      // 这里可以添加排序逻辑
    }
    
    // 随机推荐
    function randomRecommend() {
      const productCards = document.querySelectorAll('.turquoise-product-card');
      const randomIndex = Math.floor(Math.random() * productCards.length);
      const randomCard = productCards[randomIndex];
      
      // 添加闪烁效果
      randomCard.classList.add('turquoise-flash-gold');
      setTimeout(() => {
        randomCard.classList.remove('turquoise-flash-gold');
      }, 1500);
      
      // 滚动到该商品
      randomCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    
    // 回到顶部
    const backToTopBtn = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 300) {
        backToTopBtn.classList.add('turquoise-visible');
      } else {
        backToTopBtn.classList.remove('turquoise-visible');
      }
    });
    
    backToTopBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    
    // 最近浏览功能
    function loadRecentViewed() {
      const recentItems = JSON.parse(localStorage.getItem('turquoiseRecentViewed') || '[]');
      const recentSection = document.querySelector('.turquoise-recent-view');
      const recentSlider = document.getElementById('recentViewSlider');
      
      if (recentItems.length === 0) {
        if (recentSection) recentSection.style.display = 'none';
      } else {
        if (recentSection) recentSection.style.display = 'block';
        // 清空现有内容
        recentSlider.innerHTML = '';
        // 渲染浏览记录
        recentItems.forEach(item => {
          const card = document.createElement('div');
          card.className = 'turquoise-recent-card';
          card.innerHTML = `
            <div class="turquoise-recent-card-image">
              <img src="${item.image}" alt="${item.name}">
            </div>
            <div class="turquoise-recent-card-info">
              <h3 class="turquoise-recent-card-name">${item.name}</h3>
              <div class="turquoise-recent-card-price">${item.price}</div>
            </div>
          `;
          recentSlider.appendChild(card);
        });
      }
    }
    
    function addToRecentViewed(product) {
      const recentItems = JSON.parse(localStorage.getItem('turquoiseRecentViewed') || '[]');
      // 移除已存在的相同商品
      const filteredItems = recentItems.filter(item => item.id !== product.id);
      // 添加到开头
      filteredItems.unshift(product);
      // 限制最多显示5个
      const limitedItems = filteredItems.slice(0, 5);
      localStorage.setItem('turquoiseRecentViewed', JSON.stringify(limitedItems));
      // 重新加载最近浏览
      loadRecentViewed();
    }
    
    // 为商品卡片添加点击事件
    function initProductClickEvents() {
      const productCards = document.querySelectorAll('.turquoise-product-card');
      productCards.forEach(card => {
        card.addEventListener('click', () => {
          const id = card.dataset.id;
          const name = card.querySelector('.turquoise-product-name').textContent.trim();
          const price = card.querySelector('.turquoise-product-price').textContent.trim();
          const image = card.querySelector('.turquoise-product-image img').src;
          
          const product = {
            id: id,
            name: name,
            price: price,
            image: image
          };
          
          addToRecentViewed(product);
        });
      });
    }
    
    // 初始化 - 默认显示品类子选项
    document.addEventListener('DOMContentLoaded', () => {
      const categorySubTabs = document.getElementById('categorySubTabs');
      if (categorySubTabs) {
        categorySubTabs.style.display = 'flex';
        categorySubTabs.style.flexWrap = 'wrap';
      }
      
      // 初始化最近浏览
      loadRecentViewed();
      // 初始化商品点击事件
      initProductClickEvents();
    });
  </script>
</body>
</html>
