<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="mall/header::head-fragment('我的收藏','favorite')">
</head>
<body>
<header th:replace="mall/header::header-fragment"></header>
<content id="content">
    <div id="breadcrumb">
        <a th:href="@{/index}">首页</a>
        <span>></span>
        <a th:href="@{/personal}">个人中心</a>
        <span>></span>
        <span class="current">我的收藏</span>
    </div>
    <div class="my-container">
        <div class="sidebar">
            <ul>
                <li><a th:href="@{/personal}">个人中心</a></li>
                <li><a th:href="@{/orders}">我的订单</a></li>
                <li class="active"><a th:href="@{/favorite/list}">我的收藏</a></li>
                <li><a th:href="@{/addresses}">收货地址</a></li>
            </ul>
        </div>
        <div class="main-content">
            <h2>我的收藏</h2>
            <div class="favorite-list" th:if="${#lists.isEmpty(favoriteGoodsList)}">
                <div class="empty-content">
                    <img th:src="@{/mall/image/null-content.png}" alt="无收藏商品" />
                    <p>暂无收藏商品</p>
                </div>
            </div>
            <div class="favorite-list" th:unless="${#lists.isEmpty(favoriteGoodsList)}">
                <ul>
                    <li th:each="goods : ${favoriteGoodsList}">
                        <div class="favorite-item">
                            <a th:href="@{'/goods/detail/'+${goods.goodsId}}" class="goods-img">
                                <img th:src="@{${goods.goodsCoverImg}}" th:alt="${goods.goodsName}" />
                            </a>
                            <div class="goods-info">
                                <a th:href="@{'/goods/detail/'+${goods.goodsId}}" th:text="${goods.goodsName}" class="goods-name"></a>
                                <p class="goods-price" th:text="${goods.sellingPrice}">¥100.00</p>
                                <button class="btn btn-danger delete-favorite" th:data-goods-id="${goods.goodsId}">取消收藏</button>
                            </div>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</content>
<div th:replace="mall/footer::footer-fragment"></div>
<!-- jQuery -->
<script th:src="@{/admin/plugins/jquery/jquery.min.js}"></script>
<!-- Bootstrap 4 -->
<script th:src="@{/admin/plugins/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/admin/plugins/sweetalert2/sweetalert2.all.min.js}"></script>
<script th:src="@{/mall/js/search.js}" type="text/javascript"></script>
<script>
    $(function() {
        // 取消收藏
        $('.delete-favorite').on('click', function() {
            var goodsId = $(this).data('goods-id');
            var $this = $(this);
            
            $.ajax({
                url: '/favorite/delete',
                type: 'POST',
                data: { goodsId: goodsId },
                success: function(res) {
                    if (res.result === 'SUCCESS') {
                        Swal.fire({
                            title: '成功',
                            text: '取消收藏成功',
                            icon: 'success',
                            confirmButtonText: '确定'
                        }).then(function() {
                            $this.closest('li').remove();
                            // 检查是否还有收藏商品
                            if ($('.favorite-list ul li').length === 0) {
                                $('.favorite-list').html('<div class="empty-content"><img src="/mall/image/null-content.png" alt="无收藏商品" /><p>暂无收藏商品</p></div>');
                            }
                        });
                    } else {
                        Swal.fire({
                            title: '失败',
                            text: res.message || '取消收藏失败',
                            icon: 'error',
                            confirmButtonText: '确定'
                        });
                    }
                },
                error: function() {
                    Swal.fire({
                        title: '错误',
                        text: '网络错误，请稍后重试',
                        icon: 'error',
                        confirmButtonText: '确定'
                    });
                }
            });
        });
    });
</script>
<style>
    .my-container {
        display: flex;
        margin: 20px 0;
    }
    .sidebar {
        width: 200px;
        background-color: #f5f5f5;
        padding: 20px 0;
        margin-right: 20px;
    }
    .sidebar ul {
        list-style: none;
        padding: 0;
    }
    .sidebar ul li {
        padding: 10px 20px;
    }
    .sidebar ul li a {
        color: #333;
        text-decoration: none;
        display: block;
    }
    .sidebar ul li.active {
        background-color: #e0e0e0;
    }
    .main-content {
        flex: 1;
        background-color: #fff;
        padding: 20px;
        border-radius: 4px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .main-content h2 {
        margin-bottom: 20px;
        font-size: 18px;
        color: #333;
    }
    .favorite-list ul {
        list-style: none;
        padding: 0;
    }
    .favorite-item {
        display: flex;
        padding: 15px;
        border-bottom: 1px solid #eee;
    }
    .favorite-item:hover {
        background-color: #f9f9f9;
    }
    .goods-img {
        width: 100px;
        height: 100px;
        margin-right: 15px;
    }
    .goods-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .goods-info {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }
    .goods-name {
        font-size: 14px;
        color: #333;
        text-decoration: none;
        margin-bottom: 10px;
    }
    .goods-name:hover {
        color: #ff6b35;
    }
    .goods-price {
        font-size: 16px;
        color: #ff6b35;
        font-weight: bold;
        margin-bottom: 10px;
    }
    .delete-favorite {
        align-self: flex-start;
    }
    .empty-content {
        text-align: center;
        padding: 60px 0;
    }
    .empty-content img {
        width: 120px;
        height: 120px;
        margin-bottom: 20px;
    }
    .empty-content p {
        color: #999;
        font-size: 14px;
    }
</style>
</body>
</html>
