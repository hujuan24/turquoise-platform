<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>松石雅集 - 管理后台</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      background-color: #f5f2ed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-header {
      padding: 32px 32px 24px;
      text-align: center;
    }

    .brand-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .brand-logo i {
      color: #4A90E2;
      font-size: 24px;
    }

    .brand-name {
      font-size: 24px;
      font-weight: 600;
      color: #5c5448;
    }

    .brand-subtitle {
      color: #8b7e72;
      font-size: 14px;
    }

    .tab-container {
      display: flex;
      padding: 0 32px;
      margin-bottom: 24px;
      background: #faf9f7;
      border-radius: 8px;
      padding: 4px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px 16px;
      border: none;
      background: transparent;
      color: #6b6358;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.3s ease;
    }

    .tab-btn:hover {
      color: #3d352a;
    }

    .tab-btn.active {
      background: #4A90E2;
      color: white;
      box-shadow: 0 2px 8px rgba(74, 144, 226, 0.3);
    }

    .form-container {
      padding: 0 32px 32px;
      position: relative;
      overflow: hidden;
    }

    .form-panel {
      transition: all 0.3s ease;
    }

    .form-panel.hidden {
      display: none;
    }

    .form-panel.slide-in-left {
      animation: slideInLeft 0.3s ease;
    }

    .form-panel.slide-in-right {
      animation: slideInRight 0.3s ease;
    }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .input-group {
      position: relative;
      margin-bottom: 16px;
    }

    .input-group i.icon-prefix {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #b8b0a5;
      transition: color 0.2s ease;
    }

    .input-group input,
    .input-group select {
      width: 100%;
      padding: 12px 16px 12px 40px;
      border: 1px solid #e0dbd5;
      border-radius: 8px;
      font-size: 14px;
      color: #3d352a;
      background: white;
      transition: all 0.2s ease;
      outline: none;
    }

    .input-group input:focus,
    .input-group select:focus {
      border-color: #4A90E2;
      box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.15);
    }

    .input-group input:focus + i.icon-prefix,
    .input-group select:focus + i.icon-prefix {
      color: #4A90E2;
    }

    .input-group select {
      appearance: none;
      cursor: pointer;
    }

    .input-group i.select-arrow {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #b8b0a5;
      pointer-events: none;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #4A90E2;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
    }

    .submit-btn:hover {
      background: #3a7bc8;
      box-shadow: 0 4px 16px rgba(74, 144, 226, 0.35);
      transform: translateY(-1px);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .submit-btn .spinner {
      display: inline-block;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .form-footer {
      margin-top: 16px;
      text-align: center;
      font-size: 13px;
    }

    .form-footer a,
    .form-footer button {
      color: #4A90E2;
      text-decoration: none;
      background: none;
      border: none;
      cursor: pointer;
      font-size: inherit;
      transition: color 0.2s ease;
    }

    .form-footer a:hover,
    .form-footer button:hover {
      color: #3a7bc8;
    }

    .form-footer .text-muted {
      color: #8b7e72;
    }

    .forgot-link {
      display: block;
      text-align: right;
      margin-top: 12px;
    }

    .forgot-link a {
      color: #8b7e72;
      font-size: 13px;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .forgot-link a:hover {
      color: #4A90E2;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="card-header">
      <div class="brand-logo">
        <i class="fas fa-gem"></i>
        <span class="brand-name">松石雅集</span>
      </div>
      <p class="brand-subtitle">管理后台</p>
    </div>

    <div class="tab-container">
      <button class="tab-btn active" data-tab="login" onclick="switchTab('login')">登录</button>
      <button class="tab-btn" data-tab="register" onclick="switchTab('register')">注册</button>
    </div>

    <div class="form-container">
      <!-- 登录表单 -->
      <div id="loginForm" class="form-panel">
        <form onsubmit="handleLogin(event)">
          <div class="input-group">
            <i class="fas fa-user icon-prefix"></i>
            <input type="text" name="username" placeholder="用户名" required>
          </div>

          <div class="input-group">
            <i class="fas fa-lock icon-prefix"></i>
            <input type="password" name="password" placeholder="密码" required>
          </div>

          <div class="input-group">
            <i class="fas fa-user-tag icon-prefix"></i>
            <select name="role" required>
              <option value="admin">管理员</option>
              <option value="appraiser">鉴定人员</option>
            </select>
            <i class="fas fa-chevron-down select-arrow"></i>
          </div>

          <button type="submit" class="submit-btn" id="loginBtn">登 录</button>

          <div class="forgot-link">
            <a href="#">忘记密码？</a>
          </div>
        </form>
      </div>

      <!-- 注册表单 -->
      <div id="registerForm" class="form-panel hidden">
        <form onsubmit="handleRegister(event)">
          <div class="input-group">
            <i class="fas fa-user icon-prefix"></i>
            <input type="text" name="username" placeholder="用户名" required>
          </div>

          <div class="input-group">
            <i class="fas fa-phone icon-prefix"></i>
            <input type="tel" name="phone" placeholder="手机号" required>
          </div>

          <div class="input-group">
            <i class="fas fa-lock icon-prefix"></i>
            <input type="password" name="password" placeholder="密码" required>
          </div>

          <div class="input-group">
            <i class="fas fa-lock icon-prefix"></i>
            <input type="password" name="confirmPassword" placeholder="确认密码" required>
          </div>

          <div class="input-group">
            <i class="fas fa-user-tag icon-prefix"></i>
            <select name="role" required>
              <option value="admin">管理员</option>
              <option value="appraiser">鉴定人员</option>
            </select>
            <i class="fas fa-chevron-down select-arrow"></i>
          </div>

          <button type="submit" class="submit-btn" id="registerBtn">注 册</button>

          <div class="form-footer">
            <span class="text-muted">已有账号？</span>
            <button type="button" onclick="switchTab('login')">立即登录</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    let currentTab = 'login';

    function switchTab(tab) {
      if (tab === currentTab) return;

      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      const tabs = document.querySelectorAll('.tab-btn');

      tabs.forEach(t => t.classList.remove('active'));
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');

      if (tab === 'login') {
        registerForm.classList.add('hidden');
        loginForm.classList.remove('hidden');
        loginForm.classList.add('slide-in-left');
        setTimeout(() => loginForm.classList.remove('slide-in-left'), 300);
      } else {
        loginForm.classList.add('hidden');
        registerForm.classList.remove('hidden');
        registerForm.classList.add('slide-in-right');
        setTimeout(() => registerForm.classList.remove('slide-in-right'), 300);
      }

      currentTab = tab;
    }

    function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const originalText = btn.innerHTML;
      
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"><i class="fas fa-spinner"></i></span> 处理中...';

      setTimeout(() => {
        const formData = new FormData(e.target);
        console.log('登录数据:', {
          username: formData.get('username'),
          password: formData.get('password'),
          role: formData.get('role')
        });
        
        btn.disabled = false;
        btn.innerHTML = originalText;
        alert('登录成功！');
      }, 1500);
    }

    function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      const originalText = btn.innerHTML;
      
      const formData = new FormData(e.target);
      if (formData.get('password') !== formData.get('confirmPassword')) {
        alert('两次输入的密码不一致！');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"><i class="fas fa-spinner"></i></span> 处理中...';

      setTimeout(() => {
        console.log('注册数据:', {
          username: formData.get('username'),
          phone: formData.get('phone'),
          password: formData.get('password'),
          role: formData.get('role')
        });
        
        btn.disabled = false;
        btn.innerHTML = originalText;
        alert('注册成功！');
        switchTab('login');
      }, 1500);
    }
  </script>
</body>
</html>
